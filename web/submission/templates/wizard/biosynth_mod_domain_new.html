{% extends 'base.html' %}

{% import 'macros.html' as macros %}

{% block header %}
Editing {{ bgc_id }}
{% endblock %}

{% block body %}

<script type="application/javascript">
    const createNewModuleDomain = () => {
        const domainSelect = document.getElementById('domain-type-select');
        const domain = domainSelect.value;
        const hrefParts = document.location.href.split('/');

        // otherwise, rebuild the url
        let newHref = hrefParts.slice(0, hrefParts.length - 1);
        newHref.push(domain);
        document.location.href = newHref.join('/');
    };
</script>

<div class="form-wrapper container">
    <h4>Add a new modification domain</h4>

    <div class="">
        <div class="form-group row">
            <div class="col">
                <select id="domain-type-select" class="form-select">
                    {% for choice in choices %}
                    <option value="{{choice.value}}" {{'selected' if domain_type==choice.value}}>{{choice.label}}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col">
                <button class="btn btn-primary" onclick="createNewModuleDomain()">{{'Select' if domain_type == 'new'
                    else
                    'Change'}}
                    modification domain type</button>
            </div>
        </div>
    </div>
    {% if form %}
    <form method="post">
        <div class="row">
            {{ macros.simple_divform_inner(form, is_reviewer=is_reviewer, reviewed=reviewed) }}
        </div>
        <div class="container">
            <div class="form-group row">

                <input type="submit" class="btn btn-primary btn-wide green" value="Create modification domain">
            </div>
        </div>
    </form>
    <div class="container">
        <div class="form-group row">
            <a href="{{ url_for('edit.list_modification_domains', bgc_id=bgc_id, module_id=module_id) }}"><button
                    id="back-btn" class="btn btn-outline-secondary btn-wide red">Cancel</button></a>
        </div>
    </div>
    <div>
    </div>
    {% endif %}

</div>
<div class="container">
</div>
{% endblock %}
